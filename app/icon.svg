<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Baseball -->
  <circle cx="50" cy="50" r="48" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Left seam -->
  <path d="M 40 14 C 14 28, 14 72, 40 86" fill="none" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left stitch ticks -->
  <line x1="35" y1="24" x2="29" y2="20" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="37" x2="19" y2="36" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="51" x2="15" y2="51" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="64" x2="19" y2="65" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="76" x2="29" y2="80" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>

  <!-- Right seam -->
  <path d="M 60 14 C 86 28, 86 72, 60 86" fill="none" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right stitch ticks -->
  <line x1="65" y1="24" x2="71" y2="20" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="37" x2="81" y2="36" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="51" x2="85" y2="51" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="64" x2="81" y2="65" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="76" x2="71" y2="80" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>

  <!-- IB in Carolina blue -->
  <text x="50" y="50" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="28" font-weight="900" fill="#4b9cd3">IB</text>
</svg>
